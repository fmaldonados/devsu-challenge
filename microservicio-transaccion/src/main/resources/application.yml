spring:
  application:
    name: microservicio-transaccion
  datasource:
    url: jdbc:postgresql://postgres-db:5432/database_name
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

microservicios:
  cliente:
    url: ${CLIENTE_SERVICE_URL:http://localhost:8080}

server:
  port: 8081
