spring:
  application:
    name: microtal-transaccion
  datasource:
    url: jdbc:postgresql://postgres-db:5432/database_name
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

services:
  cliente:
    url: ${CLIENTE_SERVICE_URL:http://localhost:8080/api/v1/clientes}
server:
  port: 8081
